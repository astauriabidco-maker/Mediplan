name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    name: Build and test nucleus
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      JWT_SECRET: test_secret
      COUNTRY_CODE: FR
      MISTRAL_API_KEY: dummy
      PORT: 3000
      DB_TYPE: sqlite
      DB_NAME: ':memory:'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Product quality gate
        run: npm run ci:product
